# 🚗  GitaCar Rent — Nginx Configuration
server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Security: hide Nginx version
    server_tokens off;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Laravel URL rewrites
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static files cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Pass PHP requests to PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Trust proxy headers from Traefik (Dokploy reverse proxy)
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;

        # Laravel optimizations
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Allow Livewire published assets
    location /vendor/livewire/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Rewrite Livewire hash-based asset URLs to published assets
    location ~ ^/livewire-[^/]+/(.+)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files /vendor/livewire/$1 =404;
    }

    # Deny access to storage and vendor (shouldn't be public except livewire)
    location ~ ^/(storage/app/(?!public)|vendor/(?!livewire)|.env|.git) {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/gitacar_access.log;
    error_log /var/log/nginx/gitacar_error.log;
}
