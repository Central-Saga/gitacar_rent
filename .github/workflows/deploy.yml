# =============================================================================
#  🚗  GitaCar Rent — Build & Deploy
#  Build Docker image → push ke GHCR → deploy di Docker Swarm
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:  # manual re-run via gh CLI or Actions UI
    inputs:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SERVICE_NAME: gitacar-rent-app-xkb9xk

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-,format=short
            type=raw,value={{branch}}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, sqlite3, pdo_sqlite, pdo_mysql, mysql, gd, exif, zip, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install NPM dependencies and build assets for tests
        # This build is for test fixtures only — the production asset build
        # happens inside the Docker image (Alpine). The smoke test reads
        # the manifest FROM the image, not from this build, because the
        # two environments produce different CSS hashes (glibc vs musl).
        run: |
          npm ci
          npm run build

      - name: Run dashboard tests
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan test --compact tests/Feature/DashboardTest.php

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Extract expected asset hashes from the image we just built & pushed.
      # Critical: CI's npm run build (Ubuntu glibc) differs from Dockerfile's
      # npm run build (Alpine musl). Tailwind v4 oxide binary produces different
      # output, so the only reliable source of truth for what gets deployed
      # is the image itself.
      - name: Extract expected asset hashes from built image
        id: manifest
        run: |
          IMAGE_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/${IMAGE_LC}:latest
          docker create --name gha-extract ghcr.io/${IMAGE_LC}:latest
          docker cp gha-extract:/var/www/html/public/build/manifest.json /tmp/build-manifest.json
          docker rm gha-extract > /dev/null
          CSS_FILE=$(jq -r '.["resources/css/app.css"].file' /tmp/build-manifest.json)
          JS_FILE=$(jq -r '.["resources/js/app.js"].file' /tmp/build-manifest.json)
          echo "css_hash=$(basename "$CSS_FILE")" >> "$GITHUB_OUTPUT"
          echo "js_hash=$(basename "$JS_FILE")" >> "$GITHUB_OUTPUT"
          echo "css_path=$CSS_FILE" >> "$GITHUB_OUTPUT"
          echo "Extracted from image: css=$(basename "$CSS_FILE") js=$(basename "$JS_FILE")"
          cat /tmp/build-manifest.json

      - name: Trigger deploy
        id: deploy
        run: curl -s -X POST http://43.157.228.56:3000/api/deploy/8mH27a_jUXL_FzlZg1YMD

      # Dokploy's webhook only PULLS the new image; it does not restart the
      # Swarm service. Force the service to pick up the new image so the
      # running container actually serves the new code. This is idempotent
      # — if the image is unchanged, the service just re-rolls the task.
      - name: Force swarm service to use new image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 60s
          script: |
            set -e
            IMAGE_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
            NEW_DIGEST=$(docker inspect --format='{{.Id}}' "ghcr.io/${IMAGE_LC}:latest")
            CURRENT_DIGEST=$(docker inspect --format='{{.Image}}' "$(docker ps -q --filter label=com.docker.swarm.service.name=${{ env.SERVICE_NAME }} | head -1)" 2>/dev/null || echo "")
            echo "Image on host:    $NEW_DIGEST"
            echo "Container image:  $CURRENT_DIGEST"
            if [ "$NEW_DIGEST" = "$CURRENT_DIGEST" ]; then
              echo "Image unchanged, skipping update (but rolling restart for safety)"
            else
              echo "Image changed, forcing service update"
            fi
            docker service update --image "ghcr.io/${IMAGE_LC}:latest" --force "${{ env.SERVICE_NAME }}"
            echo "Service converged"

      # Ensure the persistent storage volume is mounted. Docker Swarm does not
      # persist --mount-add across service spec resets (e.g. UI redeploy), so
      # we re-apply it after every deploy. Idempotent: noop if already mounted.
      - name: Ensure persistent storage volume is mounted
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30s
          script: |
            set -e
            if ! docker service inspect ${{ env.SERVICE_NAME }} --format '{{range .Spec.TaskTemplate.ContainerSpec.Mounts}}{{.Source}} {{.Target}} {{.Type}}{{"\n"}}{{end}}' | grep -q '^gitacar_storage /var/www/html/storage/app/public volume$'; then
              echo "Adding gitacar_storage volume mount"
              docker service update --mount-add type=volume,source=gitacar_storage,destination=/var/www/html/storage/app/public ${{ env.SERVICE_NAME }}
            else
              echo "gitacar_storage mount already present, skipping"
            fi

      # Run pending database migrations. New code may depend on columns
      # that don't exist yet — failing this step = 500 in production.
      # Idempotent: artisan migrate is a noop when DB is up to date.
      - name: Run database migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 60s
          script: |
            set -e
            # Wait until at least one container task is running.
            for i in {1..30}; do
              CONTAINER=$(docker ps -q --filter label=com.docker.swarm.service.name=${{ env.SERVICE_NAME }} | head -1)
              if [ -n "$CONTAINER" ]; then break; fi
              echo "Waiting for container... attempt $i"
              sleep 2
            done
            if [ -z "$CONTAINER" ]; then
              echo "No running container for ${{ env.SERVICE_NAME }} after 60s"
              exit 1
            fi
            docker exec "$CONTAINER" php artisan migrate --force --no-interaction

      - name: Smoke test — liveness
        run: |
          echo "Waiting for deploy to roll out..."
          for i in {1..48}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://gitacarrental.web.id/up || true)
            if [ "$CODE" = "200" ]; then
              echo "✓ Liveness OK: /up returned 200"
              exit 0
            fi
            echo "Attempt $i: /up returned $CODE, retrying in 10s..."
            sleep 10
          done
          echo "✗ Liveness FAILED: /up did not return 200 within 8 minutes"
          exit 1

      - name: Smoke test — fresh asset verification
        env:
          EXPECTED_CSS: ${{ steps.manifest.outputs.css_hash }}
          EXPECTED_JS: ${{ steps.manifest.outputs.js_hash }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Expected CSS: $EXPECTED_CSS"
          echo "Expected JS:  $EXPECTED_JS"
          echo "Commit:       $COMMIT_SHA"
          # Compare against /build/manifest.json from the running container
          # — most reliable since it reflects the actual served image.
          for i in {1..48}; do
            SERVED_JSON=$(curl -sL https://gitacarrental.web.id/build/manifest.json || true)
            SERVED_CSS=$(echo "$SERVED_JSON" | jq -r '.["resources/css/app.css"].file // empty' | xargs basename 2>/dev/null)
            SERVED_JS=$(echo "$SERVED_JSON"  | jq -r '.["resources/js/app.js"].file   // empty' | xargs basename 2>/dev/null)
            if [ "$SERVED_CSS" = "$EXPECTED_CSS" ] && [ "$SERVED_JS" = "$EXPECTED_JS" ]; then
              echo "✓ Fresh assets served: css=$SERVED_CSS js=$SERVED_JS"
              echo "✓ Deploy verified end-to-end"
              exit 0
            fi
            echo "Attempt $i: served css=$SERVED_CSS js=$SERVED_JS | expected css=$EXPECTED_CSS js=$EXPECTED_JS"
            sleep 10
          done
          echo "✗ Asset hash mismatch after 8 minutes — Dokploy did not serve new image"
          echo "  expected: $EXPECTED_CSS"
          echo "  commit:   $COMMIT_SHA"
          # Notify via Telegram webhook if configured
          if [ -n "${{ secrets.DEPLOY_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"⚠️ Gitacar deploy smoke FAILED\\ncommit: $COMMIT_SHA\\nexpected CSS: $EXPECTED_CSS\\nDokploy did not serve new image within 8 min\"}" \
              || echo "(webhook notification failed, continuing)"
          fi
          exit 1
