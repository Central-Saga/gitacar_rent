# 🚗  GitaCar Rent — Nginx Configuration
server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Security: hide Nginx version
    server_tokens off;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Laravel URL rewrites
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static files cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Pass PHP requests to PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Forward the real client IP from the reverse proxy
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;

        # Forward the original protocol (https from Traefik) so Laravel can
        # detect HTTPS via trustProxies(at: '*'). Nginx does NOT auto-forward
        # incoming request headers to FastCGI — we must be explicit.
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;

        # Mark HTTPS "on" only when the connection to nginx itself is HTTPS
        # (it isn't — Traefik proxies via port 80). Leave empty so Laravel
        # relies on X-Forwarded-Proto instead.
        fastcgi_param HTTPS $https if_not_empty;

        # Laravel optimizations
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Serve Livewire hash-based static assets (JS/CSS/map) from published assets.
    # Do NOT rewrite dynamic endpoints such as /update, /upload-file or /preview-file.
    location ~ ^/livewire-[^/]+/(livewire\..*|css/.*|js/.*)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files /vendor/livewire/$1 =404;
    }

    # Deny access to storage and vendor (shouldn't be public except livewire)
    location ~ ^/(storage/app/(?!public)|vendor/(?!livewire)|.env|.git) {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/gitacar_access.log;
    error_log /var/log/nginx/gitacar_error.log;
}
