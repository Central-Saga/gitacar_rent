# =============================================================================
#  🚗  GitaCar Rent — Build & Deploy
#  Build Docker image → push ke GHCR → deploy di Docker Swarm
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.editorconfig'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SERVICE_NAME: gitacar-rent-app-xkb9xk

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-,format=short
            type=raw,value={{branch}}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, sqlite3, pdo_sqlite, pdo_mysql, mysql, gd, exif, zip, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install NPM dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Run dashboard tests
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan test --compact tests/Feature/DashboardTest.php

      - name: Record expected asset hashes
        id: manifest
        run: |
          CSS_FILE=$(jq -r '.["resources/css/app.css"].file' public/build/manifest.json)
          JS_FILE=$(jq -r '.["resources/js/app.js"].file' public/build/manifest.json)
          echo "css_hash=$(basename "$CSS_FILE")" >> $GITHUB_OUTPUT
          echo "js_hash=$(basename "$JS_FILE")" >> $GITHUB_OUTPUT
          echo "css_path=$CSS_FILE" >> $GITHUB_OUTPUT
          echo "Recorded: css=$(basename "$CSS_FILE") js=$(basename "$JS_FILE")"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger deploy
        id: deploy
        run: curl -s -X POST http://43.157.228.56:3000/api/deploy/8mH27a_jUXL_FzlZg1YMD

      - name: Smoke test — liveness
        run: |
          echo "Waiting for deploy to roll out..."
          for i in {1..48}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://gitacarrental.web.id/up || true)
            if [ "$CODE" = "200" ]; then
              echo "✓ Liveness OK: /up returned 200"
              exit 0
            fi
            echo "Attempt $i: /up returned $CODE, retrying in 10s..."
            sleep 10
          done
          echo "✗ Liveness FAILED: /up did not return 200 within 8 minutes"
          exit 1

      - name: Smoke test — fresh asset verification
        env:
          EXPECTED_CSS: ${{ steps.manifest.outputs.css_hash }}
          EXPECTED_JS: ${{ steps.manifest.outputs.js_hash }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Expected CSS: $EXPECTED_CSS"
          echo "Expected JS:  $EXPECTED_JS"
          echo "Commit:       $COMMIT_SHA"
          # Compare against /build/manifest.json from the running container
          # — most reliable since it reflects the actual served image.
          for i in {1..48}; do
            SERVED_JSON=$(curl -sL https://gitacarrental.web.id/build/manifest.json || true)
            SERVED_CSS=$(echo "$SERVED_JSON" | jq -r '.["resources/css/app.css"].file // empty' | xargs basename 2>/dev/null)
            SERVED_JS=$(echo "$SERVED_JSON"  | jq -r '.["resources/js/app.js"].file   // empty' | xargs basename 2>/dev/null)
            if [ "$SERVED_CSS" = "$EXPECTED_CSS" ] && [ "$SERVED_JS" = "$EXPECTED_JS" ]; then
              echo "✓ Fresh assets served: css=$SERVED_CSS js=$SERVED_JS"
              echo "✓ Deploy verified end-to-end"
              exit 0
            fi
            echo "Attempt $i: served css=$SERVED_CSS js=$SERVED_JS | expected css=$EXPECTED_CSS js=$EXPECTED_JS"
            sleep 10
          done
          echo "✗ Asset hash mismatch after 8 minutes — Dokploy did not serve new image"
          echo "  expected: $EXPECTED_CSS"
          echo "  commit:   $COMMIT_SHA"
          # Notify via Telegram webhook if configured
          if [ -n "${{ secrets.DEPLOY_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"⚠️ Gitacar deploy smoke FAILED\\ncommit: $COMMIT_SHA\\nexpected CSS: $EXPECTED_CSS\\nDokploy did not serve new image within 8 min\"}" \
              || echo "(webhook notification failed, continuing)"
          fi
          exit 1
